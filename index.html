<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .container {
      width: 300px;
    }

    .loading-text {
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .bar {
      width: 100%;
      height: 20px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffcc, #00ccff);
      transition: width 0.2s ease;
    }

    .prank {
      display: none;
      font-family: Comic Sans MS, cursive, sans-serif;
    }

    .prank h1 {
      font-size: 3rem;
    }

    .face {
      font-size: 4rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loader">
      <div class="loading-text">Loading, please wait…</div>
      <div class="bar">
        <div class="progress" id="progress"></div>
      </div>
